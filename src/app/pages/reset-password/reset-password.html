<!-- src/app/pages/reset-password/reset-password.html -->
<div class="min-h-screen">
  <div
    class="min-h-80 mb-12 flex items-center justify-center bg-violet-50 font-bold text-gray-800 relative"
  >
    <h1 class="text-4xl">Set New Password</h1>
  </div>

  <div
    class="w-full max-w-xl mx-auto p-12 bg-white flex flex-col items-center rounded shadow-sm"
  >
    <h2 class="text-2xl font-bold mb-6 text-center">Choose a new password</h2>

    @if (errorMessage) {
    <div
      class="w-full mb-4 px-4 py-3 rounded bg-red-50 border border-red-200 text-red-700 text-sm"
    >
      {{ errorMessage }}
    </div>
    } @if (successMessage) {
    <div
      class="w-full mb-4 px-4 py-3 rounded bg-green-50 border border-green-200 text-green-700 text-sm"
    >
      {{ successMessage }}
    </div>
    }

    <form class="space-y-6 container w-full" (ngSubmit)="onSubmit()">
      <p class="text-xs text-gray-500 mb-2">
        You opened this page using a secure reset link. The code in the link is
        used automatically.
      </p>

      <div class="flex flex-col">
        <label
          for="newPassword"
          class="mb-2 text-sm font-medium text-gray-700"
          >New Password</label
        >
        <input
          id="newPassword"
          name="newPassword"
          type="password"
          [(ngModel)]="newPassword"
          required
          class="w-full border py-4 px-3 rounded border-gray-200 focus:outline-none focus:ring-2 focus:ring-primary"
        />
      </div>

      <div class="flex flex-col">
        <label
          for="repeatPassword"
          class="mb-2 text-sm font-medium text-gray-700"
          >Repeat Password</label
        >
        <input
          id="repeatPassword"
          name="repeatPassword"
          type="password"
          [(ngModel)]="repeatPassword"
          required
          class="w-full border py-4 px-3 rounded border-gray-200 focus:outline-none focus:ring-2 focus:ring-primary"
        />
      </div>

      <button
        type="submit"
        [disabled]="isLoading"
        class="w-full bg-primary text-white py-4 rounded hover:opacity-90 transition disabled:opacity-60 disabled:cursor-not-allowed"
      >
        {{ isLoading ? 'Saving...' : 'Save new password' }}
      </button>
    </form>
  </div>
</div>
