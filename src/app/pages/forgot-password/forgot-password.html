<div style="min-height:100vh;background:#f8fafc;display:flex;flex-direction:column;">

  <!-- Header -->
  <div style="background:linear-gradient(135deg,#6366f1,#8b5cf6);padding:3rem 2rem;text-align:center;color:white;">
    <div style="font-size:2rem;font-weight:800;margin-bottom:0.5rem;">&#127891; Fluencity</div>
    <div style="font-size:1rem;opacity:0.9;">English School Management</div>
  </div>

  <div style="flex:1;display:flex;align-items:center;justify-content:center;padding:2rem;">
    <div style="background:white;border-radius:16px;padding:2.5rem;width:100%;max-width:420px;box-shadow:0 4px 24px rgba(0,0,0,0.08);">

      <!-- Icon + title -->
      <div style="text-align:center;margin-bottom:1.75rem;">
        <div style="width:56px;height:56px;background:#ede9fe;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 1rem;font-size:1.75rem;">&#128274;</div>
        <h2 style="font-size:1.5rem;font-weight:700;color:#1e293b;margin-bottom:0.5rem;">Forgot Password?</h2>
        <p style="font-size:0.875rem;color:#64748b;">Enter your email and we'll send you reset instructions.</p>
      </div>

      @if (errorMessage) {
        <div style="background:#fee2e2;color:#dc2626;padding:0.75rem 1rem;border-radius:8px;margin-bottom:1.5rem;font-size:0.875rem;">
          &#9888; {{ errorMessage }}
        </div>
      }

      @if (successMessage) {
        <div style="background:#dcfce7;color:#15803d;padding:0.75rem 1rem;border-radius:8px;margin-bottom:1.5rem;font-size:0.875rem;">
          &#10003; {{ successMessage }}
        </div>
      }

      <form (ngSubmit)="onSubmit()">
        <div style="margin-bottom:1.5rem;">
          <label style="display:block;font-size:0.875rem;font-weight:600;color:#374151;margin-bottom:0.5rem;">Email Address</label>
          <input type="email" name="email" [(ngModel)]="email" placeholder="your@email.com"
            style="width:100%;border:1.5px solid #e2e8f0;border-radius:10px;padding:0.875rem 1rem;font-size:0.875rem;outline:none;box-sizing:border-box;"
            (focus)="$event.target.style.borderColor='#6366f1'"
            (blur)="$event.target.style.borderColor='#e2e8f0'" />
        </div>

        <button type="submit" [disabled]="isLoading"
          style="width:100%;background:linear-gradient(135deg,#6366f1,#8b5cf6);color:white;padding:0.875rem;border-radius:10px;font-size:1rem;font-weight:600;border:none;cursor:pointer;margin-bottom:1rem;"
          [style.opacity]="isLoading ? '0.7' : '1'">
          {{ isLoading ? 'Sending…' : 'Send Reset Instructions' }}
        </button>
      </form>

      <div style="text-align:center;font-size:0.875rem;color:#64748b;">
        <a routerLink="/signin" style="color:#6366f1;font-weight:600;text-decoration:none;">&#8592; Back to Sign In</a>
      </div>

    </div>
  </div>
</div>
