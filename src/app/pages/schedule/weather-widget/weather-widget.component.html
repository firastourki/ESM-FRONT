<div class="bg-gradient-to-r from-blue-50 to-indigo-50 rounded-xl p-4 mb-4 border border-blue-100">
  <div class="flex items-center justify-between">
    <div class="flex items-center gap-3">
      <div class="text-4xl">{{getWeatherIcon()}}</div>
      <div>
        <h3 class="font-semibold text-gray-800">{{dayOfWeek}}</h3>
        <div class="text-sm text-gray-600">{{date}}</div>
      </div>
    </div>
    
    <div *ngIf="!loading && weather" class="text-right">
      <div class="text-2xl font-bold text-darkindigo">{{weather.temperature}}°C</div>
      <div class="text-xs text-gray-500">↓ {{weather.minTemperature}}°C</div>
    </div>
    
    <div *ngIf="loading" class="text-gray-400">
      <div class="animate-spin inline-block w-5 h-5 border-2 border-primary border-t-transparent rounded-full"></div>
    </div>
  </div>
  
  <div *ngIf="weather" class="mt-3 pt-2 border-t border-blue-100">
    <div class="flex justify-between items-center">
      <div>
        <p class="text-sm">{{weather.condition}}</p>
        <p class="text-xs text-gray-500 mt-1">{{getRainAdvice()}}</p>
        <p class="text-xs text-gray-400 mt-1">💧 Rain: {{weather.rainProbability}}%</p>
      </div>
      
      <div class="flex gap-2">
        <button (click)="speakWeather()" 
                [disabled]="voiceActive"
                class="p-2 bg-primary/10 rounded-full hover:bg-primary/20 transition-colors"
                title="Listen to weather">
          <svg *ngIf="!voiceActive" class="w-5 h-5 text-primary" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.536 8.464a5 5 0 010 7.072m2.828-9.9a9 9 0 010 12.728M5.586 15H4a1 1 0 01-1-1v-4a1 1 0 011-1h1.586l4.707-4.707C10.923 3.663 12 4.109 12 5v14c0 .891-1.077 1.337-1.707.707L5.586 15z" />
          </svg>
          <div *ngIf="voiceActive" class="w-5 h-5">
            <span class="relative flex h-5 w-5">
              <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-primary opacity-75"></span>
              <span class="relative inline-flex rounded-full w-5 h-5 bg-primary"></span>
            </span>
          </div>
        </button>
        <button (click)="stopSpeaking()" class="p-2 bg-gray-100 rounded-full hover:bg-gray-200 transition-colors">
          <svg class="w-5 h-5 text-gray-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 10a1 1 0 011-1h4a1 1 0 011 1v4a1 1 0 01-1 1h-4a1 1 0 01-1-1v-4z" />
          </svg>
        </button>
      </div>
    </div>
  </div>
</div>
