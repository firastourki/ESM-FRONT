<div style="min-height:100vh;background:#f8fafc;display:flex;flex-direction:column;">

  <!-- Header -->
  <div style="background:linear-gradient(135deg,#6366f1,#8b5cf6);padding:3rem 2rem;text-align:center;color:white;">
    <div style="font-size:2rem;font-weight:800;margin-bottom:0.5rem;">&#127891; Fluencity</div>
    <div style="font-size:1rem;opacity:0.9;">English School Management</div>
  </div>

  <!-- Card -->
  <div style="flex:1;display:flex;align-items:center;justify-content:center;padding:2rem;">
    <div style="background:white;border-radius:16px;padding:2.5rem;width:100%;max-width:420px;box-shadow:0 4px 24px rgba(0,0,0,0.08);text-align:center;">

      <!-- Loading -->
      @if (isLoading) {
        <div style="margin-bottom:1.5rem;">
          <div style="width:48px;height:48px;border:4px solid #e2e8f0;border-top-color:#6366f1;border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto 1rem;"></div>
          <h2 style="font-size:1.25rem;font-weight:700;color:#1e293b;margin-bottom:0.5rem;">Verifying your email</h2>
          <p style="font-size:0.875rem;color:#64748b;">{{ message }}</p>
        </div>
      }

      <!-- Success -->
      @if (!isLoading && !isError) {
        <div style="margin-bottom:1.5rem;">
          <div style="width:56px;height:56px;background:#dcfce7;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 1rem;font-size:1.75rem;">&#10003;</div>
          <h2 style="font-size:1.25rem;font-weight:700;color:#15803d;margin-bottom:0.5rem;">Email verified!</h2>
          <p style="font-size:0.875rem;color:#64748b;">{{ message }}</p>
        </div>
        <a routerLink="/signin"
          style="display:inline-block;background:linear-gradient(135deg,#6366f1,#8b5cf6);color:white;padding:0.75rem 2rem;border-radius:10px;font-size:0.875rem;font-weight:600;text-decoration:none;">
          Go to Sign In
        </a>
      }

      <!-- Error -->
      @if (!isLoading && isError) {
        <div style="margin-bottom:1.5rem;">
          <div style="width:56px;height:56px;background:#fee2e2;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 1rem;font-size:1.75rem;">&#9888;</div>
          <h2 style="font-size:1.25rem;font-weight:700;color:#dc2626;margin-bottom:0.5rem;">Verification failed</h2>
          <p style="font-size:0.875rem;color:#64748b;">{{ message }}</p>
        </div>
        <div style="display:flex;gap:0.75rem;justify-content:center;">
          <a routerLink="/signin"
            style="display:inline-block;background:linear-gradient(135deg,#6366f1,#8b5cf6);color:white;padding:0.75rem 1.5rem;border-radius:10px;font-size:0.875rem;font-weight:600;text-decoration:none;">
            Sign In
          </a>
          <a routerLink="/signup"
            style="display:inline-block;background:#f1f5f9;color:#374151;padding:0.75rem 1.5rem;border-radius:10px;font-size:0.875rem;font-weight:600;text-decoration:none;">
            Sign Up
          </a>
        </div>
      }

    </div>
  </div>

</div>

<style>
@keyframes spin { to { transform: rotate(360deg); } }
</style>
