<div class="container mx-auto p-6 max-w-2xl">
  <div class="bg-white rounded-lg shadow p-6">
    <h1 class="text-2xl font-bold text-darkindigo mb-6">
      {{ isEdit ? 'Edit' : 'Add' }} Attendance Record
    </h1>

    <form (ngSubmit)="onSubmit()" #attendanceForm="ngForm">
      <div class="mb-4">
        <label class="block text-gray-700 text-sm font-bold mb-2">Date</label>
        <input
          type="date"
          [(ngModel)]="attendance.date"
          name="date"
          required
          class="w-full px-3 py-2 border rounded-lg focus:outline-none focus:border-primary"
        >
      </div>

      <div class="mb-6">
        <label class="block text-gray-700 text-sm font-bold mb-2">Status</label>
        <select
          [(ngModel)]="attendance.status"
          name="status"
          required
          class="w-full px-3 py-2 border rounded-lg focus:outline-none focus:border-primary"
        >
          <option value="PRESENT">Present</option>
          <option value="ABSENT">Absent</option>
          <option value="LATE">Late</option>
        </select>
      </div>

      <div class="flex justify-end space-x-3">
        <button
          type="button"
          routerLink="/attendance"
          class="px-4 py-2 border rounded-lg hover:bg-gray-100"
        >
          Cancel
        </button>
        <button
          type="submit"
          [disabled]="!attendanceForm.form.valid || loading"
          class="bg-primary text-white px-4 py-2 rounded-lg hover:bg-secondary disabled:opacity-50"
        >
          {{ loading ? 'Saving...' : (isEdit ? 'Update' : 'Create') }}
        </button>
      </div>
    </form>
  </div>
</div>
