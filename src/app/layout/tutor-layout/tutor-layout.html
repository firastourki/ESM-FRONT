<div class="student-shell">
  <aside class="sidebar">
    <div class="logo">🎓 Tutor</div>
    <nav>
      <a routerLink="/tutor/dashboard"  routerLinkActive="active">🏠 Dashboard</a>
      <a routerLink="/tutor/grades"     routerLinkActive="active">🏆 Grades</a>
      <a routerLink="/tutor/resources"  routerLinkActive="active">📚 Resources</a>
      <a routerLink="/tutor/reports"    routerLinkActive="active">📊 Reports</a>
      <a routerLink="/tutor/profile"    routerLinkActive="active">👤 My Profile</a>
    </nav>
    <button class="logout-btn" (click)="logout()">🚪 Sign Out</button>
  </aside>
  <div class="main">
    <header class="header">
      <span>Tutor Portal</span>
      <a routerLink="/tutor/profile" style="color:#374151;text-decoration:none;font-size:0.875rem;">👤 {{ userName }}</a>
    </header>
    <main class="content">
      <router-outlet></router-outlet>
    </main>
  </div>
</div>
