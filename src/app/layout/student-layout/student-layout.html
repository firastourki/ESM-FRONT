<div class="student-shell">
  <aside class="sidebar">
    <div class="sidebar-logo">
      <img src="assets/images/logo.png" alt="Fluencity" class="logo-img"
           onerror="this.style.display='none';this.nextElementSibling.style.display='block'" />
      <span class="logo-fallback">Fluencity</span>
    </div>

    <nav>
      <a routerLink="/student/home"         routerLinkActive="active">
        <mat-icon>home</mat-icon><span>Dashboard</span>
      </a>
      <a routerLink="/student/courses"      routerLinkActive="active">
        <mat-icon>menu_book</mat-icon><span>My Courses</span>
      </a>
      <a routerLink="/student/attendance"   routerLinkActive="active">
        <mat-icon>fact_check</mat-icon><span>Attendance</span>
      </a>
      <a routerLink="/student/grades"       routerLinkActive="active">
        <mat-icon>grade</mat-icon><span>My Grades</span>
      </a>
      <a routerLink="/student/assessments"  routerLinkActive="active">
        <mat-icon>assignment</mat-icon><span>Assessments</span>
      </a>
      <a routerLink="/student/leaderboard"  routerLinkActive="active">
        <mat-icon>leaderboard</mat-icon><span>Leaderboard</span>
      </a>
      <a routerLink="/student/schedule"     routerLinkActive="active">
        <mat-icon>calendar_month</mat-icon><span>Schedule</span>
      </a>
      <a routerLink="/student/certificates" routerLinkActive="active">
        <mat-icon>workspace_premium</mat-icon><span>Certificates</span>
      </a>
      <a routerLink="/student/profile"      routerLinkActive="active">
        <mat-icon>manage_accounts</mat-icon><span>My Profile</span>
      </a>
    </nav>

    <button class="logout-btn" (click)="logout()">
      <mat-icon>logout</mat-icon><span>Sign Out</span>
    </button>
  </aside>

  <div class="main">
    <header class="topbar">
      <span class="portal-title">Student Portal</span>
      <a routerLink="/student/profile" class="user-pill">
        <mat-icon>account_circle</mat-icon><span>{{ userName }}</span>
      </a>
    </header>
    <main class="content">
      <router-outlet></router-outlet>
    </main>
  </div>
</div>
